<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Distraction</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    overflow:hidden;
}

/* Floating Background */

.floating{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    animation:float 8s infinite ease-in-out;
}

.f1{
    width:150px;
    height:150px;
    top:10%;
    left:10%;
}

.f2{
    width:220px;
    height:220px;
    bottom:10%;
    right:10%;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-30px);}
    100%{transform:translateY(0);}
}

/* Card */

.card{
    width:450px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    animation:slideUp 0.8s ease;
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h2{
    text-align:center;
    color:#2c3e50;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    transition:0.3s;
}

input:focus{
    outline:none;
    border-color:#3498db;
    box-shadow:0 0 10px rgba(52,152,219,0.3);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#3498db;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#2980b9;
    transform:translateY(-2px);
}

.back-btn{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#555;
    font-weight:bold;
}

.back-btn:hover{
    color:#3498db;
}

</style>

</head>

<body>

<div class="floating f1"></div>
<div class="floating f2"></div>

<div class="card">


<h2>📱 Add Distraction</h2>

<p class="subtitle">
    Track your daily distractions and improve focus
</p>

<form action="distraction" method="post">

    <div class="form-group">
        <label>Distraction Type</label>
        <input
            type="text"
            name="type"
            placeholder="Mobile, YouTube, Instagram..."
            required>
    </div>

    <div class="form-group">
        <label>Minutes Spent</label>
        <input
            type="number"
            name="minutes"
            min="1"
            placeholder="Enter minutes"
            required>
    </div>

    <button type="submit">
        Save Distraction
    </button>

</form>

<a href="dashboard" class="back-btn">
    ← Back to Dashboard
</a>


</div>

</body>
</html>
